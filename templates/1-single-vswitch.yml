ROSTemplateFormatVersion: '2015-09-01'
Metadata:
  ALIYUN::ROS::Interface:
    ParameterGroups:
      - Parameters:
          - VpcId
          - ZoneId
          - CidrBlock
        Label:
          default: 网络配置
Parameters:
  VpcId:
    Type: String
    Label:
      en: VPC
      zh-cn: 专有网络
    AssociationProperty: ALIYUN::ECS::VPC::VPCId
    AssociationPropertyMetadata:
      RegionId: ${ALIYUN::Region}
  ZoneId:
    Type: String
    Label:
      en: Zone ID
      zh-cn: 可用区
    AssociationProperty: ALIYUN::ECS::ZoneId
    AssociationPropertyMetadata:
      RegionId: ${ALIYUN::Region}
  CidrBlock:
    Type: String
    Label:
      en: CIDR Block
      zh-cn: 交换机网段
    Description: 交换机的 CIDR 网段，必须属于所属 VPC 的 CIDR 范围
Resources:
  VSwitch:
    Type: ALIYUN::ECS::VSwitch
    Properties:
      VpcId: !Ref VpcId
      ZoneId: !Ref ZoneId
      CidrBlock: !Ref CidrBlock
      VSwitchName: app-vswitch
Outputs:
  VSwitchId:
    Description: 创建的交换机 ID
    Value: !GetAtt VSwitch.VSwitchId
    Label:
      en: VSwitch ID
      zh-cn: 交换机 ID
  CidrBlock:
    Description: 交换机的 CIDR 网段
    Value: !GetAtt VSwitch.CidrBlock
    Label:
      en: CIDR Block
      zh-cn: 交换机网段
